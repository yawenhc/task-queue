<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="refresh" content="2">
    <meta charset="UTF-8">
    <title>Radish Monitor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 24px;
            background: #f7f7f9;
            color: #222;
        }

        h1, h2 {
            margin-bottom: 12px;
        }

        .nav {
            margin-bottom: 24px;
        }

        .nav a {
            margin-right: 16px;
            text-decoration: none;
            color: #0056b3;
            font-weight: bold;
        }

        .card-row {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            min-width: 180px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
        }

        .card-title {
            font-size: 14px;
            color: #555;
            margin-bottom: 8px;
        }

        .card-value {
            font-size: 24px;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border: 1px solid #ddd;
        }

        th, td {
            padding: 10px 12px;
            border-bottom: 1px solid #eee;
            text-align: left;
            vertical-align: top;
            font-size: 14px;
        }

        th {
            background: #f0f2f5;
        }

        .status-busy {
            color: #b26a00;
            font-weight: bold;
        }

        .status-idle {
            color: #0a7a34;
            font-weight: bold;
        }

        .status-offline {
            color: #b00020;
            font-weight: bold;
        }

        .state-pill {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 999px;
            background: #eef2f7;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Radish Monitor</h1>

    <div class="nav">
        <a href="/workers">Workers</a>
        <a href="/worker-overview">Worker Overview</a>
        <a href="/tasks">Tasks</a>
    </div>

    {% block content %}{% endblock %}
</body>
</html>
